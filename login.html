<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Ventas Personalizadas</title>
  <script>
    (function() {
      var saved = localStorage.getItem('vp_theme');
      var t = saved ? saved : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="src/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo-icon">VP</div>
      <div class="login-app-name">Ventas Personalizadas</div>
      <div class="login-app-sub">Sporting + Woker eCommerce · Luquin</div>
    </div>
    <div class="login-card">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" placeholder="usuario@empresa.com"
                 autocomplete="email" autofocus />
        </div>
        <div class="field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" name="password" placeholder="••••••••"
                 autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
      <div class="alert-err" id="login-err" hidden></div>
    </div>
    <div class="login-footer">Herramienta interna — acceso restringido</div>
  </div>

  <script src="src/js/config.js"></script>
  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Redirigir si ya hay sesión válida
    (function () {
      try {
        const d = JSON.parse(localStorage.getItem('vp_session') || 'null');
        if (d && d.expira_en && new Date(d.expira_en) > new Date()) {
          window.location.href = 'index.html';
        }
      } catch (_) {}
    })();

    const form  = document.getElementById('loginForm');
    const errEl = document.getElementById('login-err');
    const btn   = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-pwd').value;
      errEl.hidden = true;

      if (!email || !password) {
        errEl.textContent = 'Completá los dos campos.';
        errEl.hidden = false;
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Verificando…';

      try {
        if (!CFG.apiUrl) throw new Error('No hay URL de API configurada.');
        const password_hash = await sha256(password);
        const res = await fetch(CFG.apiUrl, {
          method: 'POST',
          body:   JSON.stringify({ action: 'login', email, password_hash }),
        });
        if (!res.ok) throw new Error('Error de conexión (' + res.status + ').');
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'Credenciales incorrectas.');

        localStorage.setItem('vp_session', JSON.stringify({
          session_token: json.session_token,
          usuario:       json.usuario,
          permisos:      json.permisos,
          expira_en:     json.expira_en,
        }));
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Error al iniciar sesión. Verificá tu conexión.';
        errEl.hidden = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
